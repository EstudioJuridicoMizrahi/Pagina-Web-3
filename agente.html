<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 30px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; font-size: 1.5rem; }
        #btn { background: #238636; border: none; border-radius: 50%; width: 85px; height: 85px; cursor: pointer; margin: 20px; outline: none; }
        #btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; }
        #res { margin-top: 20px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; min-height: 60px; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <p id="st">Hacé clic para hablar</p>
        <button id="btn" onclick="escuchar()">🎤</button>
        <div id="res">Esperando...</div>
    </div>

    <script>
        const p1 = "AIzaSy"; 
        const p2 = "DteAu1wTmuPZkVmD6BQljL-4lF6058XpM";
        const KEY = p1 + p2;

        const resDiv = document.getElementById('res');
        const st = document.getElementById('st');
        const btn = document.getElementById('btn');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'es-AR';

        rec.onstart = () => { st.innerText = "Escuchando..."; btn.classList.add('active'); };
        rec.onend = () => { btn.classList.remove('active'); st.innerText = "Procesando..."; };

        rec.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            resDiv.innerHTML = "<b>Vos:</b> " + txt;
            
            // LISTA DE MODELOS POSIBLES (Si falla uno, prueba el siguiente)
            const modelos = [
                "gemini-1.5-flash-latest",
                "gemini-1.5-flash",
                "gemini-pro"
            ];

            for (let m of modelos) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${KEY}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents: [{parts: [{text: "Sos el socio de Daniel Mizrahi. Sé breve y sarcástico. Respondé a: " + txt}]}]})
                    });
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        resDiv.innerHTML = "<b>Socio:</b> " + aiText;
                        hablar(aiText);
                        st.innerText = "Listo";
                        return; // Éxito, salimos del bucle
                    }
                } catch (err) {
                    console.log("Fallo con modelo " + m);
                }
            }
            resDiv.innerText = "Error: Google no reconoce ninguno de sus modelos hoy.";
        };

        function escuchar() { try { rec.start(); } catch(e) {} }
    </script>
</body>
</html>
