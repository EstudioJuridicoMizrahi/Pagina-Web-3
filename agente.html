<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Digital - Mizrahi</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 30px; max-width: 450px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #mic-btn { background: #238636; border: none; border-radius: 50%; width: 90px; height: 90px; cursor: pointer; margin: 20px; transition: 0.3s; }
        #mic-btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; }
        #response-container { margin-top: 20px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; min-height: 60px; }
        .status { color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <p class="status" id="status">Presioná el botón para hablar</p>
        
        <button id="mic-btn" onclick="toggleListen()">
            <svg viewBox="0 0 24 24" width="40" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <div id="response-container">Esperando consulta jurídica...</div>
    </div>

    <script>
        // --- COLOCÁ TU CLAVE ACÁ ---
        const API_KEY = "AIzaSyA4SeZKkKFC-0BCI62mhd9gM7RcuHyEMqk"; 
        // ---------------------------

        const statusText = document.getElementById('status');
        const responseDiv = document.getElementById('response-container');
        const btn = document.getElementById('mic-btn');

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'es-AR';
            window.speechSynthesis.speak(utter);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'es-AR';

        recognition.onstart = () => {
            statusText.innerText = "Te escucho...";
            btn.classList.add('active');
        };

        recognition.onend = () => {
            btn.classList.remove('active');
            statusText.innerText = "Procesando...";
        };

        // CORRECCIÓN DEL ERROR DE LA CONSOLA:
        recognition.onresult = function(event) {
            const userText = event.results[0][0].transcript;
            responseDiv.innerHTML = "<strong>Vos:</strong> " + userText;
            
            // Llamamos a una función aparte para usar el await correctamente
            llamarIA(userText);
        };

        async function llamarIA(texto) {
            try {
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Sos el socio digital del abogado Daniel Mizrahi. Respondé de forma breve, profesional y sarcástica a: " + texto }] }]
                    })
                });
                
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                responseDiv.innerHTML = "<strong>Socio Digital:</strong> " + aiResponse;
                hablar(aiResponse);
                statusText.innerText = "Listo";
            } catch (err) {
                responseDiv.innerText = "Error de conexión con el cerebro.";
                hablar("Hay un problema con la clave de API, Daniel.");
            }
        }

        function toggleListen() {
            recognition.start();
        }
    </script>
</body>
</html>
