<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="AIzaSyA4SeZKkKFC-0BCI62mhd9gM7RcuHyEMqk">
    <title>Socio Digital - Mizrahi</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        #mic-btn { background: #238636; border: none; border-radius: 50%; width: 80px; height: 80px; cursor: pointer; margin: 20px; box-shadow: 0 0 15px rgba(35,134,54,0.5); }
        #mic-btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; }
        .status { color: #8b949e; margin-top: 10px; }
        #response { margin-top: 30px; padding: 20px; background: #161b22; border-radius: 10px; border: 1px solid #30363d; text-align: left; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>Socio Digital Mizrahi</h1>
    <p class="status" id="status">Presioná para hablar con tu socio</p>
    
    <button id="mic-btn" onclick="toggleListen()">
        <svg viewBox="0 0 24 24" width="40" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>

    <div id="response">Esperando consulta...</div>

    <script>
        const API_KEY = "AIzaSyA4SeZKkKFC-0BCI62mhd9gM7RcuHyEMqk"; // <--- PEGÁ TU CLAVE ACÁ
        const statusText = document.getElementById('status');
        const responseDiv = document.getElementById('response');

        function hablar(texto) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'es-AR';
            synth.speak(utter);
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-AR';

        recognition.onstart = () => { statusText.innerText = "Escuchando..."; document.getElementById('mic-btn').classList.add('active'); };
        recognition.onend = () => { statusText.innerText = "Procesando..."; document.getElementById('mic-btn').classList.remove('active'); };

        recognition.onresult = async (event) => {
            const prompt = event.results[0][0].transcript;
            responseDiv.innerHTML = `<strong>Vos:</strong> ${prompt}<br><br><em>Pensando...</em>`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Actuá como un socio jurídico senior de Daniel Mizrahi en Argentina. Sé profesional pero sarcástico y amistoso. Respondé a: " + prompt }] }] })
                });
                
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                responseDiv.innerHTML = `<strong>Socio Digital:</strong> ${aiText}`;
                hablar(aiText);
                statusText.innerText = "Listo";
            } catch (err) {
                responseDiv.innerText = "Error: ¿Pegaste bien la API Key?";
                hablar("Daniel, creo que te olvidaste de configurar mi cerebro. Revisá la clave de API.");
            }
        };

        function toggleListen() { recognition.start(); }
    </script>
</body>
</html>
