<script>
    let API_KEY = "";

    async function iniciar() {
        if (!API_KEY) {
            API_KEY = prompt("Ingresá tu Clave de API (...2ARk):");
            if (!API_KEY) return;
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) return alert("Navegador no soportado.");

        const rec = new Recognition();
        rec.lang = 'es-AR';

        rec.onstart = () => { document.getElementById('st').innerText = "Escuchando..."; };

        rec.onresult = async (e) => {
            const mensajeUsuario = e.results[0][0].transcript;
            document.getElementById('res').innerHTML = "<b>Daniel:</b> " + mensajeUsuario;

            try {
                // RUTA BLINDADA: v1beta con modelo -latest
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Sos el socio abogado sarcástico de Daniel Mizrahi. Sé breve. Respondé a: " + mensajeUsuario }] }]
                    })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                if (data.candidates && data.candidates[0].content) {
                    const respuestaIA = data.candidates[0].content.parts[0].text;
                    document.getElementById('res').innerHTML = "<b>Socio:</b> " + respuestaIA;
                    document.getElementById('st').innerText = "Listo";

                    const u = new SpeechSynthesisUtterance(respuestaIA);
                    u.lang = 'es-AR';
                    window.speechSynthesis.speak(u);
                }
            } catch (err) {
                document.getElementById('res').innerHTML = "<b style='color:#f85149;'>Error de Google:</b> " + err.message;
            }
        };
        rec.start();
    }
</script>
