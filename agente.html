<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 40px; display: inline-block; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; margin-bottom: 10px; }
        #btn { background: #238636; border: none; color: white; padding: 20px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        #btn:hover { background: #2ea043; transform: scale(1.05); }
        #btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; }
        #res { margin-top: 30px; text-align: left; background: #0d1117; padding: 20px; border-radius: 10px; border-left: 5px solid #58a6ff; min-height: 80px; font-size: 1.1em; line-height: 1.5; }
        .status { font-size: 0.8em; color: #8b949e; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <p class="status" id="st">Listo para la audiencia</p>
        <button id="btn" onclick="iniciar()">🎤 EMPEZAR A HABLAR</button>
        <div id="res">Esperando tu consulta...</div>
    </div>

    <script>
        let API_KEY = "";

        async function iniciar() {
            if (!API_KEY) {
                API_KEY = prompt("Ingresá tu Clave de API (...2ARk):");
                if (!API_KEY) return;
            }

            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) return alert("Tu navegador no soporta reconocimiento de voz.");

            const rec = new Recognition();
            rec.lang = 'es-AR';

            rec.onstart = () => { 
                document.getElementById('st').innerText = "Escuchando..."; 
                document.getElementById('btn').classList.add('active');
            };

            rec.onend = () => { 
                document.getElementById('btn').classList.remove('active');
            };

            rec.onresult = async (e) => {
                const mensajeUsuario = e.results[0][0].transcript;
                document.getElementById('res').innerHTML = "<b>Daniel:</b> " + mensajeUsuario + "<br><i>Procesando...</i>";

                try {
                    // LA RUTA DEFINITIVA: v1beta para máxima compatibilidad con Gemini 1.5 Flash
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Sos el socio abogado sarcástico de Daniel Mizrahi. Sé muy breve. Respondé a: " + mensajeUsuario }] }]
                        })
                    });

                    const data = await response.json();

                    if (data.error) {
                        throw new Error(data.error.message);
                    }

                    if (data.candidates && data.candidates[0].content) {
                        const respuestaIA = data.candidates[0].content.parts[0].text;
                        document.getElementById('res').innerHTML = "<b>Socio:</b> " + respuestaIA;
                        document.getElementById('st').innerText = "Listo";

                        const sintesis = window.speechSynthesis;
                        const u = new SpeechSynthesisUtterance(respuestaIA);
                        u.lang = 'es-AR';
                        sintesis.speak(u);
                    } else {
                        throw new Error("Respuesta inesperada de Google.");
                    }

                } catch (err) {
                    document.getElementById('res').innerHTML = "<b style='color:#f85149;'>Fallo en el alegato:</b> " + err.message;
                    document.getElementById('st').innerText = "Error";
                }
            };

            rec.start();
        }
    </script>
</body>
</html>
