<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 30px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; font-size: 1.5rem; margin-bottom: 5px; }
        #btn { background: #238636; border: none; border-radius: 50%; width: 85px; height: 85px; cursor: pointer; margin: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; outline: none; margin: auto; }
        #btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; }
        #res { margin-top: 20px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; min-height: 60px; font-size: 0.95rem; line-height: 1.5; }
        .st { color: #8b949e; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <p class="st" id="st">Presioná para dictar tu consulta</p>
        
        <button id="btn" onclick="escuchar()">
            <svg viewBox="0 0 24 24" width="40" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <div id="res">Esperando...</div>
    </div>

    <script>
        const p1 = "AIzaSy"; 
        const p2 = "DteAu1wTmuPZkVmD6BQljL-4lF6058XpM";
        const KEY = p1 + p2;

        const resDiv = document.getElementById('res');
        const st = document.getElementById('st');
        const btn = document.getElementById('btn');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const rec = new SpeechRecognition();
        rec.lang = 'es-AR';

        rec.onstart = () => { st.innerText = "Te escucho, Daniel..."; btn.classList.add('active'); };
        rec.onend = () => { btn.classList.remove('active'); st.innerText = "Procesando..."; };

        rec.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            resDiv.innerHTML = "<b>Vos:</b> " + txt;
            
            try {
                // CAMBIO CLAVE: Usamos 'v1' y el nombre de modelo correcto
                const url = "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=" + KEY;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: "Sos el socio jurídico senior de Daniel Mizrahi. Sé muy breve, sarcástico y profesional. Respondé a: " + txt}]}]})
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;
                resDiv.innerHTML = "<b>Socio:</b> " + aiText;
                hablar(aiText);
                st.innerText = "Listo";
            } catch (err) {
                resDiv.innerText = "Error: " + err.message;
                hablar("Algo salió mal en el servidor, Daniel.");
            }
        };

        function escuchar() { try { rec.start(); } catch(e) {} }
    </script>
</body>
</html>
