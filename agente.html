<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Socio Mizrahi - Diagnóstico</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #log { margin-top: 20px; text-align: left; font-family: monospace; font-size: 12px; color: #ffa657; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Diagnóstico Socio Digital</h1>
        <button onclick="probarConexion()">PROBAR CONEXIÓN</button>
        <div id="log">Esperando prueba...</div>
    </div>

    <script>
        // DIVIDÍ LA CLAVE NUEVA ACÁ:
        const p1 = "AIzaSy"; 
        const p2 = "DIU-optDkovlfsIDpPb3s8PnYnXLNZIyY"; 
        const KEY = p1 + p2;

        async function probarConexion() {
            const log = document.getElementById('log');
            log.innerText = "Enviando señal a Google...";
            
            try {
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + KEY;
                const r = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: "Hola"}]}]})
                });
                
                const data = await r.json();
                
                if (data.error) {
                    log.innerHTML = "❌ ERROR DE GOOGLE:<br>" + JSON.stringify(data.error, null, 2);
                } else {
                    log.innerHTML = "✅ ¡ÉXITO! Google respondió:<br>" + data.candidates[0].content.parts[0].text;
                }
            } catch (err) {
                log.innerHTML = "❌ ERROR DE RED: No se pudo llegar a Google.";
            }
        }
    </script>
</body>
</html>
