<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 30px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #btn { background: #238636; border: none; border-radius: 50%; width: 90px; height: 90px; cursor: pointer; margin: 20px; font-size: 40px; outline: none; transition: 0.3s; }
        #btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; transform: scale(1.1); }
        #res { margin-top: 20px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; min-height: 80px; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <p id="st">Presioná para hablar</p>
        <button id="btn" onclick="escuchar()">🎤</button>
        <div id="res">Esperando...</div>
    </div>

    <script>
        // Tu clave confirmada en la captura 303
        const KEY = "AIzaSyDIU-optDkovlfsIDpPb3s8PnYnXLNZIyY"; 

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'es-AR';

        rec.onstart = () => { document.getElementById('st').innerText = "Escuchando..."; document.getElementById('btn').classList.add('active'); };
        rec.onend = () => { document.getElementById('btn').classList.remove('active'); document.getElementById('st').innerText = "Consultando..."; };

        rec.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            document.getElementById('res').innerHTML = "<b>Vos:</b> " + txt;
            
            try {
                // Volvemos a la v1 estable pero con un truco de "modo sin cors" si falla
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Sos el socio del abogado Daniel Mizrahi. Respondé de forma muy breve y sarcástica. Daniel dice: " + txt }] }]
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error ? errorData.error.message : "Error desconocido");
                }

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('res').innerHTML = "<b>Socio:</b> " + aiText;
                hablar(aiText);
                document.getElementById('st').innerText = "Listo";

            } catch (err) {
                document.getElementById('res').innerHTML = "<b>Error del sistema:</b> " + err.message;
                console.error(err);
                hablar("Hubo una interrupción en la línea, Daniel.");
            }
        };

        function escuchar() { try { rec.start(); } catch(e) {} }
    </script>
</body>
</html>
