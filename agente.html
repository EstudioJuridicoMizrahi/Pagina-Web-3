<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 30px; max-width: 400px; width: 90%; }
        #btn { background: #238636; border: none; border-radius: 50%; width: 90px; height: 90px; cursor: pointer; font-size: 40px; margin: 20px; }
        #btn.active { background: #da3633; box-shadow: 0 0 20px #da3633; }
        #res { margin-top: 20px; text-align: left; background: #0d1117; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; min-height: 80px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <p id="st">Presioná para hablar</p>
        <button id="btn" onclick="escuchar()">🎤</button>
        <div id="res">Esperando...</div>
    </div>

    <script>
        const KEY = "AIzaSyDIU-optDkovlfsIDpPb3s8PnYnXLNZIyY"; 

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'es-AR';

        rec.onstart = () => { document.getElementById('st').innerText = "Escuchando..."; document.getElementById('btn').classList.add('active'); };
        rec.onend = () => { document.getElementById('btn').classList.remove('active'); };

        rec.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            document.getElementById('res').innerHTML = "<b>Daniel:</b> " + txt;
            
            try {
                // Usamos la URL v1 (estable) con el modelo flash
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Respondé como un socio abogado sarcástico y muy breve: " + txt }] }] })
                });
                
                const d = await response.json();
                if (d.error) throw new Error(d.error.message);

                const ai = d.candidates[0].content.parts[0].text;
                document.getElementById('res').innerHTML = "<b>Socio:</b> " + ai;
                hablar(ai);
                document.getElementById('st').innerText = "Listo";
            } catch (err) {
                document.getElementById('res').innerText = "Error de conexión. Intentá en Incógnito o revisá AdBlock.";
            }
        };

        function escuchar() { try { rec.start(); } catch(e) {} }
    </script>
</body>
</html>
