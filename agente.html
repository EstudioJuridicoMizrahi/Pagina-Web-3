<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 30px; display: inline-block; max-width: 450px; }
        #btn { background: #238636; border: none; color: white; padding: 15px 32px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        #res { margin-top: 20px; color: #58a6ff; text-align: left; font-size: 0.9em; line-height: 1.4; }
        .error-box { color: #f85149; background: rgba(248, 81, 73, 0.1); padding: 10px; border-radius: 5px; margin-top: 10px; border: 1px solid #f85149; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <button id="btn" onclick="escuchar()">🎤 EMPEZAR A HABLAR</button>
        <div id="res">Esperando...</div>
    </div>

    <script>
        let KEY = "";

        async function escuchar() {
            if (!KEY) {
                KEY = prompt("Pegá tu Clave de API aquí (la que creaste última):");
                if (!KEY) return;
            }

            const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
            rec.lang = 'es-AR';

            rec.onstart = () => { document.getElementById('res').innerText = "Escuchando..."; };

            rec.onresult = async (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('res').innerHTML = "<b>Daniel:</b> " + txt + "<br><i>Procesando...</i>";
                
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Respondé como un socio abogado sarcástico y breve: " + txt }] }]
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Manejo de errores de Google
                    if (data.error) {
                        document.getElementById('res').innerHTML = `<div class="error-box"><b>Error de Google:</b> ${data.error.message}</div>`;
                        return;
                    }

                    if (data.candidates && data.candidates[0].content) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        document.getElementById('res').innerHTML = "<b>Socio:</b> " + aiText;
                        
                        const u = new SpeechSynthesisUtterance(aiText);
                        u.lang = 'es-AR';
                        window.speechSynthesis.speak(u);
                    }

                } catch (err) {
                    document.getElementById('res').innerHTML = `<div class="error-box"><b>Fallo técnico:</b> ${err.message}</div>`;
                }
            };

            rec.start();
        }
    </script>
</body>
</html>
