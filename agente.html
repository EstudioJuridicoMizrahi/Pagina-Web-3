<script>
    // No dejamos la clave escrita. La pedimos al abrir la página.
    const KEY = prompt("Por seguridad, ingresá tu Clave de API:"); 

    const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
    rec.lang = 'es-AR';

    rec.onstart = () => { document.getElementById('st').innerText = "Escuchando..."; document.getElementById('btn').classList.add('active'); };
    rec.onend = () => { document.getElementById('btn').classList.remove('active'); };

    rec.onresult = async (e) => {
        const txt = e.results[0][0].transcript;
        document.getElementById('res').innerHTML = "<b>Daniel:</b> " + txt;
        
        try {
            // Usamos la ruta estable que habilitamos en Cloud
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Sos el socio abogado sarcástico de Daniel Mizrahi. Sé breve. Respondé a: " + txt }] }]
                })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const aiText = data.candidates[0].content.parts[0].text;
            document.getElementById('res').innerHTML = "<b>Socio:</b> " + aiText;
            
            const u = new SpeechSynthesisUtterance(aiText);
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
            document.getElementById('st').innerText = "Listo";

        } catch (err) {
            document.getElementById('res').innerHTML = "<b>Error:</b> " + err.message;
            console.error(err);
        }
    };

    function escuchar() { if(!KEY) return alert("Falta la clave"); rec.start(); }
</script>
