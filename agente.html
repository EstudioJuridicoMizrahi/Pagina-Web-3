<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Socio Digital Mizrahi</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 40px; display: inline-block; max-width: 450px; }
        #btn { background: #238636; border: none; color: white; padding: 15px 32px; font-size: 18px; border-radius: 50px; cursor: pointer; }
        #res { margin-top: 20px; text-align: left; padding: 15px; background: #0d1117; border-radius: 10px; border-left: 5px solid #58a6ff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Socio Digital Mizrahi</h1>
        <button id="btn" onclick="iniciar()">🎤 EMPEZAR A HABLAR</button>
        <div id="res">Esperando...</div>
    </div>

    <script>
        let KEY = "";
        async function iniciar() {
            if (!KEY) {
                KEY = prompt("Pegá la clave definitiva (...2ARk):");
                if (!KEY) return;
            }

            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Recognition();
            rec.lang = 'es-AR';

            rec.onresult = async (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('res').innerHTML = "<b>Daniel:</b> " + txt;

                try {
                    // USAMOS EL MODELO PRO QUE ES MÁS ESTABLE PARA CUENTAS NUEVAS
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Sos el socio abogado sarcástico de Daniel Mizrahi. Sé breve. Respondé a: " + txt }] }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const aiText = data.candidates[0].content.parts[0].text;
                    document.getElementById('res').innerHTML = "<b>Socio:</b> " + aiText;

                    const u = new SpeechSynthesisUtterance(aiText);
                    u.lang = 'es-AR';
                    window.speechSynthesis.speak(u);

                } catch (err) {
                    document.getElementById('res').innerHTML = "<b style='color:red;'>Error:</b> " + err.message;
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
